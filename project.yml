name: Tracy
options:
  bundleIdPrefix: com.ferris
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Tracy:
    type: application
    platform: iOS
    sources:
      - Tracy
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ferris.tracy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Tracy/Info.plist
      properties:
        CFBundleDisplayName: Tracy
        CFBundleDevelopmentRegion: zh-Hans
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Tracy/Tracy.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ferris.tracy
    dependencies:
      - target: TracyWidget

  TracyWidget:
    type: app-extension
    platform: iOS
    sources:
      - TracyWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ferris.tracy.widget
        SKIP_INSTALL: true
    info:
      path: TracyWidget/Info.plist
      properties:
        CFBundleDisplayName: Tracy
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TracyWidget/TracyWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ferris.tracy

  TracyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TracyTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Tracy

schemes:
  Tracy:
    build:
      targets:
        Tracy: all
        TracyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - TracyTests
